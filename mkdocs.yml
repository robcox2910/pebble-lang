site_name: Pebble
site_url: https://robcox2910.github.io/pebble-lang/
site_description: An educational compiler and bytecode VM for the Pebble language
repo_url: https://github.com/robcox2910/pebble-lang
repo_name: robcox2910/pebble-lang

theme:
  name: material
  palette:
    - scheme: default
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Concepts:
      - Tokens: concepts/tokens.md
      - Lexer: concepts/lexer.md
      - Error Messages: concepts/errors.md
      - AST: concepts/ast.md
      - Parser: concepts/parser.md
      - Types: concepts/types.md
      - Operators: concepts/operators.md
      - Statements: concepts/statements.md
      - Functions: concepts/functions.md
      - Semantic Analysis: concepts/analyzer.md
      - Compiler: concepts/compiler.md
      - VM: concepts/vm.md
      - String Interpolation: concepts/string-interpolation.md
      - Arrays: concepts/arrays.md
      - String Methods: concepts/strings.md
      - Dictionaries: concepts/dicts.md
      - Standard Library: concepts/stdlib.md
      - Closures: concepts/closures.md
      - Higher-Order Functions: concepts/higher-order.md
      - Error Handling: concepts/error-handling.md
      - REPL: concepts/repl.md
